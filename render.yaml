services:
  - type: web
    name: bookshelf
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: /data/bookshelf.db
    disk:
      name: bookshelf-data
      mountPath: /data
      sizeGB: 1
